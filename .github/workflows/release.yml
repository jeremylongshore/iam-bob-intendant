name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run (skip tag/push/release)"
        required: false
        default: false
        type: boolean
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  discussions: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Verify readiness
        run: |
          echo "--- Checking for uncommitted changes ---"
          if ! git diff --quiet || ! git diff --staged --quiet; then
            echo "::error::Uncommitted changes detected"
            exit 1
          fi
          echo "Working tree is clean."

          echo "--- Running tests (if available) ---"
          if [ -f "Makefile" ] && grep -q "^test:" Makefile; then
            make test || true
          elif [ -f "package.json" ] && grep -q '"test"' package.json; then
            npm test || true
          elif [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then
            python -m pytest || true
          elif [ -f "Cargo.toml" ]; then
            cargo test || true
          elif [ -f "go.mod" ]; then
            go test ./... || true
          else
            echo "No test runner detected, skipping."
          fi

      - name: Determine previous tag
        id: prev
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "Previous tag: $PREV_TAG"

      - name: Check if release is needed
        id: check
        run: |
          PREV_TAG="${{ steps.prev.outputs.tag }}"
          if [ "$PREV_TAG" = "v0.0.0" ]; then
            echo "First release — proceeding."
            echo "needed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Only release for substantive work. Exclude merge commits and
          # bookkeeping commits that carry no shippable change: the workflow's
          # own `chore(release):` bumps and `chore(beads):` state syncs. Without
          # this, every push to main — including routine beads bookkeeping —
          # cuts an empty version bump.
          TOTAL=$(git rev-list "${PREV_TAG}..HEAD" --count --no-merges)
          # `--format=` (tformat) newline-terminates every line, including the
          # last — `--pretty=format:` omits the final newline and grep -c then
          # undercounts the last commit.
          SUBSTANTIVE=$(git log "${PREV_TAG}..HEAD" --no-merges --format='%s' \
            | grep -cvE '^chore\(release\)|^chore\(beads\)' || true)
          echo "Commits since $PREV_TAG: ${TOTAL} (no-merges), ${SUBSTANTIVE} substantive"
          if [ "${SUBSTANTIVE:-0}" -eq 0 ]; then
            echo "Only merge/bookkeeping commits since last tag. Skipping release."
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide bump type
        id: bump
        if: steps.check.outputs.needed == 'true'
        run: |
          MANUAL_BUMP="${{ github.event.inputs.bump || 'auto' }}"
          PREV_TAG="${{ steps.prev.outputs.tag }}"

          if [ "$MANUAL_BUMP" != "auto" ]; then
            echo "type=$MANUAL_BUMP" >> "$GITHUB_OUTPUT"
            echo "Using manual bump: $MANUAL_BUMP"
            exit 0
          fi

          # Auto-detect from commit messages since last tag
          COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|^[a-z]+!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.*\))?:"; then
            BUMP="minor"
          else
            BUMP="patch"
          fi

          # Pre-1.0 guard: while the major version is 0, the version ladder
          # (v0.1 / v0.2 / …) carries planning-milestone meaning, so an AUTO
          # release must never mint a 0.x.0 (or 1.0.0) off a conventional-commit
          # type. Clamp auto bumps to patch; a deliberate minor/major is taken
          # only via workflow_dispatch (the `bump` input, handled above).
          PREV_MAJOR=$(echo "${PREV_TAG#v}" | cut -d. -f1)
          if [ "${PREV_MAJOR:-0}" = "0" ] && [ "$BUMP" != "patch" ]; then
            echo "Pre-1.0: clamping auto '$BUMP' to 'patch' (use workflow_dispatch for a deliberate $BUMP)."
            BUMP="patch"
          fi

          echo "type=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Auto-detected bump: $BUMP"

      - name: Compute next version
        id: version
        if: steps.check.outputs.needed == 'true'
        run: |
          PREV_TAG="${{ steps.prev.outputs.tag }}"
          BUMP="${{ steps.bump.outputs.type }}"

          # Strip leading 'v'
          VERSION="${PREV_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Update version files
        if: steps.check.outputs.needed == 'true'
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          VERSION_NUM="${NEXT#v}"

          # package.json (Node.js)
          if [ -f "package.json" ]; then
            tmp=$(mktemp)
            jq --arg v "$VERSION_NUM" '.version = $v' package.json > "$tmp" && mv "$tmp" package.json
            git add package.json
            echo "Updated package.json to $VERSION_NUM"
          fi

          # package-lock.json
          if [ -f "package-lock.json" ]; then
            tmp=$(mktemp)
            jq --arg v "$VERSION_NUM" '.version = $v' package-lock.json > "$tmp" && mv "$tmp" package-lock.json
            git add package-lock.json || true
            echo "Updated package-lock.json to $VERSION_NUM"
          fi

          # pyproject.toml (Python)
          if [ -f "pyproject.toml" ]; then
            sed -i "s/^version = \".*\"/version = \"$VERSION_NUM\"/" pyproject.toml || true
            git add pyproject.toml
            echo "Updated pyproject.toml to $VERSION_NUM"
          fi

          # Cargo.toml (Rust)
          if [ -f "Cargo.toml" ]; then
            sed -i "0,/^version = \".*\"/s//version = \"$VERSION_NUM\"/" Cargo.toml || true
            git add Cargo.toml
            echo "Updated Cargo.toml to $VERSION_NUM"
          fi

          # version.txt (universal fallback)
          echo "$VERSION_NUM" > version.txt
          git add version.txt
          echo "Updated version.txt to $VERSION_NUM"

      - name: Generate changelog entry
        if: steps.check.outputs.needed == 'true'
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          PREV_TAG="${{ steps.prev.outputs.tag }}"
          VERSION_NUM="${NEXT#v}"
          DATE=$(date +%Y-%m-%d)
          REPO_URL="https://github.com/${{ github.repository }}"

          # Build the new version section in Keep a Changelog form: a dated,
          # v-less header (link refs below map the bare version to the v-tag)
          # plus conventional-commit-categorised ### subsections. This shape
          # satisfies the /release Phase 2.6 conformance gate; a flat commit
          # dump would not.
          if [ "$PREV_TAG" = "v0.0.0" ]; then RANGE="HEAD"; else RANGE="${PREV_TAG}..HEAD"; fi

          ADDED=""; FIXED=""; CHANGED=""; SECURITY=""; DEPRECATED=""; REMOVED=""; RAW=""
          # `|| [ -n "$subj" ]` processes the final line — git log emits no trailing newline.
          while IFS=$'\t' read -r subj hash || [ -n "$subj" ]; do
            [ -z "$subj" ] && continue
            # Skip the automation's own version-bump commits — pure changelog noise.
            printf '%s' "$subj" | grep -qE '^chore\(release\):' && continue
            entry="- ${subj} (${hash})"
            RAW="${RAW}${entry}"$'\n'
            if printf '%s' "$subj" | grep -qE '^[a-zA-Z]+(\([^)]*\))?!:' || printf '%s' "$subj" | grep -q 'BREAKING CHANGE'; then
              CHANGED="${CHANGED}- **BREAKING:** ${subj} (${hash})"$'\n'; continue
            fi
            ctype=$(printf '%s' "$subj" | sed -nE 's/^([a-zA-Z]+)(\([^)]*\))?:.*/\1/p' | tr '[:upper:]' '[:lower:]')
            case "$ctype" in
              feat)          ADDED="${ADDED}${entry}"$'\n' ;;
              fix)           FIXED="${FIXED}${entry}"$'\n' ;;
              security|sec)  SECURITY="${SECURITY}${entry}"$'\n' ;;
              deprecate)     DEPRECATED="${DEPRECATED}${entry}"$'\n' ;;
              remove)        REMOVED="${REMOVED}${entry}"$'\n' ;;
              *)             CHANGED="${CHANGED}${entry}"$'\n' ;;
            esac
          done < <(git log $RANGE --pretty=format:'%s%x09%h')

          # Fallback: never emit an empty section set (Phase 2.6 requires a
          # populated subsection). If the range held only filtered chores,
          # list every commit under Changed.
          if [ -z "${ADDED}${FIXED}${CHANGED}${SECURITY}${DEPRECATED}${REMOVED}" ]; then
            CHANGED="$RAW"
          fi

          # if-form (not `&&`) so an empty section returns 0 — under `set -e`
          # a bare `[ -n "$2" ] && ...` would abort the run on the first empty section.
          emit() { if [ -n "$2" ]; then printf '### %s\n\n%s\n' "$1" "$2"; fi; }
          {
            printf '## [%s] - %s\n\n' "$VERSION_NUM" "$DATE"
            emit "Added" "$ADDED"
            emit "Changed" "$CHANGED"
            emit "Deprecated" "$DEPRECATED"
            emit "Removed" "$REMOVED"
            emit "Fixed" "$FIXED"
            emit "Security" "$SECURITY"
          } | awk 'NF{blank=0} !NF{blank++} blank<2' > /tmp/changelog_entry.md
          # Trim trailing blank lines so the merge keeps single-blank spacing.
          printf '%s\n' "$(cat /tmp/changelog_entry.md)" > /tmp/changelog_entry.md

          # Bootstrap a Keep a Changelog file if one doesn't exist.
          if [ ! -f CHANGELOG.md ]; then
            {
              echo "# Changelog"
              echo ""
              echo "All notable changes to this project will be documented in this file."
              echo ""
              echo "The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),"
              echo "and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html)."
              echo ""
              echo "## [Unreleased]"
              echo ""
            } > CHANGELOG.md
          fi

          # Guarantee an "## [Unreleased]" anchor exists (older files may lack it).
          if ! grep -q '^## \[Unreleased\]' CHANGELOG.md; then
            awk 'NR==1{print; print ""; print "## [Unreleased]"; next} {print}' \
              CHANGELOG.md > /tmp/cl && mv /tmp/cl CHANGELOG.md
          fi

          # Insert the new section immediately AFTER "## [Unreleased]" so the
          # preamble and Unreleased marker stay at the top where KAC expects them.
          awk -v ef="/tmp/changelog_entry.md" '
            {print}
            /^## \[Unreleased\]/ && !done {
              print ""
              while ((getline line < ef) > 0) print line
              done=1
            }
          ' CHANGELOG.md > /tmp/changelog_merged.md
          mv /tmp/changelog_merged.md CHANGELOG.md

          # Maintain the link-reference block at the bottom (best-effort).
          if grep -q '^\[Unreleased\]:' CHANGELOG.md; then
            sed -i "s|^\[Unreleased\]:.*|[Unreleased]: ${REPO_URL}/compare/${NEXT}...HEAD|" CHANGELOG.md
            if [ "$PREV_TAG" = "v0.0.0" ]; then
              NEWREF="[$VERSION_NUM]: ${REPO_URL}/releases/tag/${NEXT}"
            else
              NEWREF="[$VERSION_NUM]: ${REPO_URL}/compare/${PREV_TAG}...${NEXT}"
            fi
            awk -v ref="$NEWREF" '
              {print}
              /^\[Unreleased\]:/ && !done {print ref; done=1}
            ' CHANGELOG.md > /tmp/cl && mv /tmp/cl CHANGELOG.md
          fi

          git add CHANGELOG.md
          echo "Changelog updated for $VERSION_NUM"

      - name: Sync README version references
        if: steps.check.outputs.needed == 'true'
        continue-on-error: true
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          PREV_TAG="${{ steps.prev.outputs.tag }}"

          if [ -f "README.md" ] && [ "$PREV_TAG" != "v0.0.0" ]; then
            sed -i "s/${PREV_TAG}/${NEXT}/g" README.md || true
            sed -i "s/${PREV_TAG#v}/${NEXT#v}/g" README.md || true
            git add README.md || true
            echo "README.md version references updated"
          fi

      - name: Commit version bump
        if: steps.check.outputs.needed == 'true'
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          git diff --staged --quiet || git commit -m "chore(release): ${NEXT}"

      - name: Create tag and push
        if: steps.check.outputs.needed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          git tag -a "$NEXT" -m "Release $NEXT"
          git push origin HEAD "$NEXT"
          echo "Pushed tag $NEXT"

      - name: Create GitHub Release
        if: steps.check.outputs.needed == 'true' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          gh release create "$NEXT" \
            --title "iam-bob-intendant $NEXT" \
            --generate-notes \
            --latest

      - name: Dry run summary
        if: github.event.inputs.dry_run == 'true'
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          echo "::notice::Dry run complete. Would have released $NEXT"
          echo "## Dry Run Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** $NEXT" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Bump:** ${{ steps.bump.outputs.type }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Previous:** ${{ steps.prev.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Skip summary
        if: steps.check.outputs.needed != 'true'
        run: |
          echo "::notice::No release needed — no new commits since ${{ steps.prev.outputs.tag }}"
