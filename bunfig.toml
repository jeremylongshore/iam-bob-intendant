# Bun configuration.
#
# Test files are excluded from the coverage denominator. The coverage GATE itself
# lives in scripts/coverage-gate.sh (wired into CI), which enforces the
# PROJECT-AGGREGATE floor — Bun's built-in `coverageThreshold` is per-file, which
# is too blunt here: the deliberately gated real-environment paths in the watcher
# (the AGP_SANDBOX=docker and AGP_CHANNEL=slack live legs of src/cli/commands/
# watch.ts) can't run in CI and would fail any per-file floor. The kernel
# primitives Bob composes are covered in AGP's own suite.

[test]
coverageSkipTestFiles = true
